name: KT OS FINAL MASTER

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli zip unzip wget python3 e2fsprogs android-sdk-libsparse-utils
          git clone https://github.com/xpirt/sdat2img.git
          git clone https://github.com/xpirt/img2sdat.git
          chmod -R +x sdat2img img2sdat

      - name: Process ROM
        run: |
          # 1. Download ROM
          URL="https://downloads.sourceforge.net/project/ha3g-project/LineageOS-18.1/lineage-18.1-20220412-UNOFFICIAL-ha3g.zip"
          wget -q $URL -o rom.zip
          unzip -q rom.zip -d rom_workspace

          # 2. Extract System
          DAT=$(find rom_workspace -name "system.new.dat.br")
          LIST=$(find rom_workspace -name "system.transfer.list")
          brotli -d "$DAT"
          python3 sdat2img/sdat2img.py "$LIST" "${DAT%.br}" system.img

          # 3. Mount and Inject MicroG (The KT OS Secret Sauce)
          mkdir mnt
          sudo mount -o loop system.img mnt
          sudo mkdir -p mnt/system/priv-app/KT_MicroG
          sudo wget -q "https://github.com/microg/GmsCore/releases/latest/download/GmsCore.apk" -O mnt/system/priv-app/KT_MicroG/KT_MicroG.apk
          sudo chmod 644 mnt/system/priv-app/KT_MicroG/KT_MicroG.apk
          
          # Add Permission Whitelist for Spoofing
          sudo mkdir -p mnt/system/etc/permissions
          sudo bash -c "cat > mnt/system/etc/permissions/microg.xml <<EOF
          <permissions>
              <permission name=\"android.permission.FAKE_PACKAGE_SIGNATURE\" />
          </permissions>
          EOF"

          sudo umount -l mnt

          # 4. Repack for Note 3
          img2simg system.img system_sparse.img
          python3 img2sdat/img2sdat.py system_sparse.img -o . -v 4 -p system
          
          # Put everything back in the ZIP
          cp system.new.dat system.transfer.list rom_workspace/
          cd rom_workspace && zip -r9 ../KT_OS_FINAL.zip .

      - name: Upload Finished ROM
        uses: actions/upload-artifact@v4
        with:
          name: KT_OS_FINAL
          path: KT_OS_FINAL.zip
