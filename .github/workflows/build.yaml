name: KT OS Hardened Final Pipeline (ha3g Exynos)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Environment & Tool Preparation
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y brotli zip unzip wget python3 e2fsprogs ffmpeg curl jq android-sdk-libsparse-utils
          git clone https://github.com/xpirt/sdat2img.git
          git clone https://github.com/xpirt/img2sdat.git
          sudo chmod -R 777 sdat2img/ img2sdat/

      - name: 2. Source Extraction & Path Discovery
        run: |
          set -e
          wget -q "https://sourceforge.net/projects/ajhut/files/lineage-18.1-20211112-UNOFFICIAL-ha3g.zip/download" -O rom.zip
          mkdir -p rom_workspace
          unzip -q rom.zip -d rom_workspace/ && sync
          
          # Dynamic Path Discovery
          echo "DAT_PATH=$(find rom_workspace -name 'system.new.dat*' | head -n 1)" >> $GITHUB_ENV
          echo "LIST_PATH=$(find rom_workspace -name 'system.transfer.list' | head -n 1)" >> $GITHUB_ENV
          
          # Security Map Extraction
          find rom_workspace -name "file_contexts" -exec cp {} . \;
          if [ ! -s "file_contexts" ]; then echo "FATAL: Security map missing"; exit 1; fi
          sed -i 's/\r$//' file_contexts

      - name: 3. Block-Level System Reconstruction
        run: |
          set -e
          if [[ "$DAT_PATH" == *.br ]]; then
            brotli -d "$DAT_PATH"
            DAT_PATH="${DAT_PATH%.br}"
          fi
          sync
          
          python3 sdat2img/sdat2img.py "$LIST_PATH" "$DAT_PATH" system.img
          mkdir mnt
          sudo mount -t ext4 -o loop system.img mnt

      - name: 4. Strategic Injection & Permission Hardening
        run: |
          set -e
          # Detect real system path (handles /system/ vs /system/system/)
          TARGET=$(find mnt -type d -path "*/system/app" | head -n 1 | sed 's|/app||')
          
          # App Structure
          sudo mkdir -p $TARGET/priv-app/KT_AppStore
          sudo mkdir -p $TARGET/app/KT_Launcher
          
          # Downloads
          sudo curl -L "https://gitlab.com/AuroraOSS/AuroraStore/-/releases/permalink/latest/downloads/AuroraStore.apk" -o $TARGET/priv-app/KT_AppStore/KT_AppStore.apk
          sudo curl -L "https://github.com/LawnchairLauncher/lawnchair/releases/download/v12.1.0-alpha.4/Lawnchair-12.1.0-Alpha-4.apk" -o $TARGET/app/KT_Launcher/KT_Launcher.apk
          
          # Permissions
          sudo chmod 644 $TARGET/priv-app/KT_AppStore/*.apk
          sudo chmod 644 $TARGET/app/KT_Launcher/*.apk
          sudo chown -R 0:0 $TARGET/priv-app $TARGET/app

      - name: 5. Boot Animation & Verified Audio Trigger
        run: |
          set -e
          if [ -f "kt_boot.mp4" ]; then
            mkdir -p work/part0
            ffmpeg -i kt_boot.mp4 -vn -c:a libvorbis work/PowerOn.ogg
            ffmpeg -i kt_boot.mp4 -vf "scale=1080:1920,fps=30" work/part0/%03d.png
            echo -e "1080 1920 30\np 1 0 part0" > work/desc.txt
            (cd work && zip -r0 bootanimation.zip part0 desc.txt)
            
            MEDIA=$(find mnt -type d -path "*/media" | head -n 1)
            sudo mkdir -p $MEDIA/audio/ui
            sudo cp work/bootanimation.zip $MEDIA/
            sudo cp work/PowerOn.ogg $MEDIA/audio/ui/

            # HARDWARE FIX: Create a dedicated init service for the sound
            # This ensures the sound plays even if the animation service skips it
            INIT_DIR=$(find mnt -type d -path "*/etc/init" | head -n 1)
            sudo bash -c "cat << EOF > $INIT_DIR/kt_sounds.rc
          service kt_bootsound /system/bin/stagefright -a -o /system/media/audio/ui/PowerOn.ogg
              class late_start
              user root
              group audio
              oneshot
          EOF"
          fi

      - name: 6. SELinux Repack & Hardware Handshake
        run: |
          set -e
          sync && sudo umount -l mnt
          img2simg system.img system_sparse.img
          
          # Restoring file_contexts is mandatory for Note 3 GPU initialization
          python3 img2sdat/img2sdat.py system_sparse.img -o . -v 4 -p system -c file_contexts
          
          brotli -q 6 system.new.dat -o system.new.dat.br
          rm -f system.img system_sparse.img system.new.dat

      - name: 7. Final Compilation (v1_GOLD)
        run: |
          set -e
          rm -f rom_workspace/system.new.dat* rom_workspace/system.transfer.list
          cp system.new.dat.br system.transfer.list rom_workspace/
          cd rom_workspace
          zip -r ../KT_OS_Note3_v1_GOLD.zip .

      - name: 8. Artifact Delivery
        uses: actions/upload-artifact@v4
        with:
          name: KT_OS_Note3_v1_GOLD
          path: KT_OS_Note3_v1_GOLD.zip
