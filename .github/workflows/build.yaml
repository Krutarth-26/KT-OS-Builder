name: KTOS FINAL STABLE (BOOT SAFE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # INSTALL TOOLS
      # -------------------------
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y unzip zip ffmpeg brotli python3 e2fsprogs git

      # -------------------------
      # DOWNLOAD BASE ROM
      # -------------------------
      - name: Download Base ROM
        run: |
          mkdir rom
          cd rom
          wget https://downloads.sourceforge.net/project/ajhut/lineage-18.1-20211112-UNOFFICIAL-ha3g.zip -O base_rom.zip
          unzip base_rom.zip

      # -------------------------
      # CONVERT SYSTEM IMAGE
      # -------------------------
      - name: Convert system
        run: |
          cd rom

          # Get conversion tool
          git clone https://github.com/xpirt/sdat2img.git

          # Decompress .br → .dat
          brotli --decompress system.new.dat.br -o system.new.dat

          # Convert to IMG
          python3 sdat2img/sdat2img.py system.transfer.list system.new.dat system.img

          # Mount system
          mkdir system_raw
          sudo mount -o loop system.img system_raw

          # Copy system files
          mkdir system
          sudo cp -r system_raw/* system/

      # -------------------------
      # ADD AURORA STORE (ONLY SAFE APP)
      # -------------------------
      - name: Inject Aurora Store
        run: |
          sudo mkdir -p rom/system/system/priv-app/AuroraStore
          sudo cp prebuilt/AuroraStore.apk rom/system/system/priv-app/AuroraStore/AuroraStore.apk

      # -------------------------
      # FIX PERMISSIONS
      # -------------------------
      - name: Fix Permissions
        run: |
          sudo chmod -R 755 rom/system/system

      # -------------------------
      # CREATE BOOTANIMATION
      # -------------------------
      - name: Create Bootanimation
        run: |
          mkdir boot
          cp prebuilt/kt_boot.mp4 boot/
          cd boot

          mkdir frames
          ffmpeg -i kt_boot.mp4 -vf "fps=24,scale=720:1280" frames/frame_%04d.png

          mkdir -p bootanimation/part0
          cp frames/*.png bootanimation/part0/

          echo "720 1280 24" > bootanimation/desc.txt
          echo "p 0 0 part0" >> bootanimation/desc.txt

          cd bootanimation
          zip -r ../../bootanimation.zip .

      # -------------------------
      # APPLY BOOTANIMATION
      # -------------------------
      - name: Apply Bootanimation
        run: |
          sudo cp bootanimation.zip rom/system/system/media/bootanimation.zip

      # -------------------------
      # CLEAN FILES
      # -------------------------
      - name: Cleanup
        run: |
          cd rom
          rm -f system.new.dat system.new.dat.br system.transfer.list system.img

      # -------------------------
      # REPACK FINAL ROM
      # -------------------------
      - name: Repack ROM
        run: |
          cd rom
          zip -r ../KTOS-FINAL.zip *

      # -------------------------
      # UPLOAD RESULT
      # -------------------------
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: KTOS-FINAL
          path: KTOS-FINAL.zip
