name: KT OS Hardened Final Pipeline (ha3g Exynos)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Environment & Tool Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli zip unzip wget python3 e2fsprogs ffmpeg curl jq android-sdk-libsparse-utils
          git clone https://github.com/xpirt/sdat2img.git
          git clone https://github.com/xpirt/img2sdat.git
          sudo chmod -R 777 sdat2img/ img2sdat/

      - name: 2. Source Discovery (Alternate Reliable Source)
        run: |
          # USING ALTERNATE MIRROR FOR HA3G 18.1
          wget -q "https://netcologne.dl.sourceforge.net/project/ha3g-project/LineageOS-18.1/lineage-18.1-20220412-UNOFFICIAL-ha3g.zip" -O rom.zip
          mkdir -p rom_workspace
          unzip -o -q rom.zip -d rom_workspace/ && sync
          
          # Discovery: Capture paths for block-tools
          echo "DAT_PATH=$(find rom_workspace -name 'system.new.dat*' | head -n 1)" >> $GITHUB_ENV
          echo "LIST_PATH=$(find rom_workspace -name 'system.transfer.list' | head -n 1)" >> $GITHUB_ENV
          
          # WIDE-NET SECURITY MAP SEARCH
          # We look for file_contexts in the root AND inside any sub-folders
          MAP_FILE=$(find . -name "file_contexts" | head -n 1)
          if [ -n "$MAP_FILE" ]; then
            cp "$MAP_FILE" ${GITHUB_WORKSPACE}/file_contexts
            sed -i 's/\r$//' ${GITHUB_WORKSPACE}/file_contexts
            echo "SUCCESS: Security map found."
          else
            # If still missing, we pull a generic 18.1 map to prevent the crash
            # This is a 'safety net' to guarantee the build continues
            curl -L "https://raw.githubusercontent.com/LineageOS/android_system_sepolicy/lineage-18.1/private/file_contexts" -o ${GITHUB_WORKSPACE}/file_contexts
            echo "WARNING: Using external Lineage 18.1 map fallback."
          fi

      - name: 3. Block-Level System Reconstruction
        run: |
          if [[ "$DAT_PATH" == *.br ]]; then
            brotli -d "$DAT_PATH"
            DAT_PATH="${DAT_PATH%.br}"
          fi
          sync
          python3 ${GITHUB_WORKSPACE}/sdat2img/sdat2img.py "$LIST_PATH" "$DAT_PATH" system.img
          mkdir mnt
          sudo mount -t ext4 -o loop system.img mnt

      - name: 4. Strategic Injection & Permission Hardening
        run: |
          TARGET=$(find mnt -type d -path "*/system/app" | head -n 1 | sed 's|/app||')
          sudo mkdir -p $TARGET/priv-app/KT_Store $TARGET/app/KT_Launcher
          
          sudo curl -L "https://gitlab.com/AuroraOSS/AuroraStore/-/releases/permalink/latest/downloads/AuroraStore.apk" -o $TARGET/priv-app/KT_Store/KT_Store.apk
          sudo curl -L "https://github.com/LawnchairLauncher/lawnchair/releases/download/v12.1.0-alpha.4/Lawnchair-12.1.0-Alpha-4.apk" -o $TARGET/app/KT_Launcher/KT_Launcher.apk
          
          sudo chmod 644 $TARGET/priv-app/KT_Store/*.apk $TARGET/app/KT_Launcher/*.apk
          sudo chown -R 0:0 $TARGET/priv-app $TARGET/app

      - name: 5. Display & Audio Engine Calibration
        run: |
          if [ -f "kt_boot.mp4" ]; then
            mkdir -p work/part0
            ffmpeg -i kt_boot.mp4 -vn -c:a libvorbis work/PowerOn.ogg
            ffmpeg -i kt_boot.mp4 -vf "scale=1080:1920,fps=30" work/part0/%03d.png
            echo -e "1080 1920 30\np 1 0 part0" > work/desc.txt
            (cd work && zip -r0 bootanimation.zip part0 desc.txt)
            
            MEDIA=$(find mnt -type d -path "*/media" | head -n 1)
            sudo mkdir -p $MEDIA/audio/ui
            sudo cp work/bootanimation.zip $MEDIA/
            sudo cp work/PowerOn.ogg $MEDIA/audio/ui/
            
            BPROP=$(sudo find mnt -name "build.prop" | head -n 1)
            sudo bash -c "echo 'persist.sys.bootanim.play_sound=1' >> $BPROP"
          fi

      - name: 6. Repacking & Hardware Handshake
        run: |
          sync && sudo umount -l mnt
          img2simg system.img system_sparse.img
          
          # REPACKING WITH DISCOVERED/FALLBACK CONTEXT
          python3 ${GITHUB_WORKSPACE}/img2sdat/img2sdat.py system_sparse.img -o . -v 4 -p system -c ${GITHUB_WORKSPACE}/file_contexts
          
          brotli -q 6 system.new.dat -o system.new.dat.br
          rm -f system.img system_sparse.img system.new.dat

      - name: 7. Final Package Generation (v1_GOLD)
        run: |
          rm -f rom_workspace/system.new.dat* rom_workspace/system.transfer.list
          cp system.new.dat.br system.transfer.list rom_workspace/
          cd rom_workspace && zip -r ../KT_OS_GOLD.zip .

      - name: 8. Deliver Final Build
        uses: actions/upload-artifact@v4
        with:
          name: KT_OS_GOLD
          path: KT_OS_GOLD.zip
