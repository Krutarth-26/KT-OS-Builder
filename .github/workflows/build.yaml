name: KTOS FINAL BUILD (FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # INSTALL TOOLS
      # -------------------------
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y unzip zip ffmpeg openjdk-8-jdk brotli python3 e2fsprogs

      # -------------------------
      # DOWNLOAD BASE ROM
      # -------------------------
      - name: Download Base ROM
        run: |
          mkdir rom
          cd rom
          wget https://downloads.sourceforge.net/project/ajhut/lineage-18.1-20211112-UNOFFICIAL-ha3g.zip -O base_rom.zip
          unzip base_rom.zip

      # -------------------------
      # CONVERT SYSTEM IMAGE (FIXED)
      # -------------------------
      - name: Convert system
        run: |
          cd rom

          # Clone tool
          git clone https://github.com/xpirt/sdat2img.git

          # Step 1: Decompress FIRST
          brotli --decompress system.new.dat.br -o system.new.dat

          # Step 2: Convert to IMG
          python3 sdat2img/sdat2img.py system.transfer.list system.new.dat system.img

          # Step 3: Mount system
          mkdir system_raw
          sudo mount -o loop system.img system_raw

          # Step 4: Copy system files
          mkdir system
          sudo cp -r system_raw/* system/

      # -------------------------
      # BUILD KT AI APP
      # -------------------------
      - name: Build KT App
        run: |
          mkdir ktapp
          cd ktapp

          mkdir -p src/com/kt/search

          cat <<EOF > src/com/kt/search/MainActivity.java
          package com.kt.search;

          import android.app.Activity;
          import android.os.Bundle;
          import android.content.Intent;
          import android.net.Uri;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      Intent i = new Intent(Intent.ACTION_VIEW, Uri.parse("https://lens.google.com"));
                      startActivity(i);
                  } catch (Exception e) {}
                  finish();
              }
          }
          EOF

          cat <<EOF > AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.kt.search">
              <application android:label="KT Circle Search">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir build
          javac -source 1.8 -target 1.8 -d build src/com/kt/search/MainActivity.java
          jar cvf KTSearch.apk -C build .

      # -------------------------
      # ADD SYSTEM APPS
      # -------------------------
      - name: Inject Apps
        run: |
          mkdir -p rom/system/system/priv-app/AuroraStore
          cp prebuilt/AuroraStore.apk rom/system/system/priv-app/AuroraStore/AuroraStore.apk

          mkdir -p rom/system/system/priv-app/KTSearch
          cp ktapp/KTSearch.apk rom/system/system/priv-app/KTSearch/KTSearch.apk

      # -------------------------
      # FIX PERMISSIONS
      # -------------------------
      - name: Fix Permissions
        run: |
          chmod -R 755 rom/system/system

      # -------------------------
      # CREATE BOOTANIMATION
      # -------------------------
      - name: Create Bootanimation
        run: |
          mkdir boot
          cp prebuilt/kt_boot.mp4 boot/
          cd boot

          mkdir frames
          ffmpeg -i kt_boot.mp4 -vf "fps=24,scale=720:1280" frames/frame_%04d.png

          mkdir -p bootanimation/part0
          cp frames/*.png bootanimation/part0/

          echo "720 1280 24" > bootanimation/desc.txt
          echo "p 0 0 part0" >> bootanimation/desc.txt

          cd bootanimation
          zip -r ../../bootanimation.zip .

      # -------------------------
      # APPLY BOOTANIMATION
      # -------------------------
      - name: Apply Bootanimation
        run: |
          cp bootanimation.zip rom/system/system/media/bootanimation.zip

      # -------------------------
      # REPACK SYSTEM
      # -------------------------
      - name: Repack System
        run: |
          cd rom
          sudo make_ext4fs -s -l 2147483648 -a system new_system.img system

      # -------------------------
      # CLEAN OLD FILES
      # -------------------------
      - name: Cleanup
        run: |
          cd rom
          rm -f system.new.dat system.new.dat.br system.transfer.list system.img

      # -------------------------
      # REPACK ROM ZIP
      # -------------------------
      - name: Repack ROM
        run: |
          cd rom
          zip -r ../KTOS-FINAL.zip *

      # -------------------------
      # UPLOAD RESULT
      # -------------------------
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: KTOS-FINAL
          path: KTOS-FINAL.zip
