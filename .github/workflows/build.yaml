name: KTOS FINAL FLASHABLE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # -------------------------
      # 1️⃣ Checkout repository
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # 2️⃣ Install required tools
      # -------------------------
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y unzip zip ffmpeg

      # -------------------------
      # 3️⃣ Download base ROM
      # -------------------------
      - name: Download Base ROM
        run: |
          mkdir -p rom
          cd rom
          wget -c -O base_rom.zip "https://downloads.sourceforge.net/project/ajhut/lineage-18.1-20211112-UNOFFICIAL-ha3g.zip"
          unzip -q base_rom.zip
          cd ..

      # -------------------------
      # 4️⃣ Inject Aurora Store
      # -------------------------
      - name: Inject Aurora Store
        run: |
          mkdir -p rom/system/priv-app/AuroraStore
          cp prebuilt/AuroraStore.apk rom/system/priv-app/AuroraStore/AuroraStore.apk

      # -------------------------
      # 5️⃣ Apply Boot Animation
      # -------------------------
      - name: Apply Boot Animation
        run: |
          mkdir -p rom/system/media
          cp prebuilt/kt_boot.mp4 rom/system/media/
          cd rom/system/media
          mkdir frames
          ffmpeg -i kt_boot.mp4 -vf "fps=24,scale=720:1280" frames/frame_%04d.png
          mkdir bootanimation
          mkdir bootanimation/part0
          cp frames/*.png bootanimation/part0/
          echo "720 1280 24" > bootanimation/desc.txt
          echo "p 0 0 part0" >> bootanimation/desc.txt
          zip -r bootanimation.zip bootanimation
          cd ../../..

      # -------------------------
      # 6️⃣ Create META-INF updater script
      # -------------------------
      - name: Create META-INF for TWRP
        run: |
          mkdir -p rom/META-INF/com/google/android
          cat > rom/META-INF/com/google/android/updater-script <<'EOF'
ui_print("Flashing KTOS System...");
mount("ext4", "EMMC", "/dev/block/platform/msm_sdcc.1/by-name/system", "/system");
package_extract_dir("system", "/system");
unmount("/system");
ui_print("KTOS Flash complete!");
EOF

      # -------------------------
      # 7️⃣ Create final flashable ZIP
      # -------------------------
      - name: Create Flashable ZIP
        run: |
          cd rom
          zip -r ../KTOS-FINAL.zip META-INF system
          cd ..

      # -------------------------
      # 8️⃣ Upload Flashable ZIP
      # -------------------------
      - name: Upload Flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: KTOS-FINAL
          path: KTOS-FINAL.zip
